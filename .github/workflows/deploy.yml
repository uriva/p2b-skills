name: Deploy Tank Skills

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  discover:
    name: Discover skills
    runs-on: ubuntu-latest
    outputs:
      skill-dirs: ${{ steps.skills.outputs.skill-dirs }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: skills
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ -z "${BEFORE:-}" ] || [[ "$BEFORE" =~ ^0+$ ]]; then
            files=$(git ls-files '*/tank.json')
          elif git rev-parse --verify --quiet "$BEFORE"^{commit} >/dev/null 2>&1; then
            files=$(git diff --name-only "$BEFORE" "$SHA")
          elif git rev-parse --verify --quiet "$SHA~1"^{commit} >/dev/null 2>&1; then
            files=$(git diff --name-only "$SHA~1" "$SHA")
          else
            files=$(git ls-files '*/tank.json')
          fi

          dirs=$(
            printf '%s\n' "$files" |
              while IFS= read -r file; do
                dir=${file%%/*}
                if [ "$dir" != "$file" ] && [ -f "$dir/tank.json" ]; then
                  printf '%s\n' "$dir"
                fi
              done |
              sort -u |
              jq -R -s -c 'split("\n") | map(select(length > 0))'
          )

          echo "skill-dirs=$dirs" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.skill-dir }}
    needs: discover
    if: needs.discover.outputs.skill-dirs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill-dir: ${{ fromJson(needs.discover.outputs.skill-dirs) }}
    defaults:
      run:
        working-directory: ${{ matrix.skill-dir }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Tank CLI
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            # Resolve the latest tag via redirect URL rather than GitHub API to avoid rate limiting (403)
            TAG_URL=$(curl -fsSL -o /dev/null -w "%{url_effective}" https://github.com/tankpkg/tank/releases/latest)
            TAG=${TAG_URL##*/}
            if [ -n "$TAG" ]; then
              echo "Resolved latest Tank version: $TAG"
              curl -fsSL "https://github.com/tankpkg/tank/releases/download/${TAG}/tank-linux-x64" -o tank
              curl -fsSL "https://github.com/tankpkg/tank/releases/download/${TAG}/SHA256SUMS" -o SHA256SUMS
              EXPECTED_SUM=$(awk -v name="tank-linux-x64" '$2==name { print $1 }' SHA256SUMS)
              ACTUAL_SUM=$(sha256sum tank | awk '{print $1}')
              if [ "$EXPECTED_SUM" = "$ACTUAL_SUM" ]; then
                sudo mv tank /usr/local/bin/tank
                sudo chmod +x /usr/local/bin/tank
                echo "Successfully installed Tank $TAG"
                exit 0
              else
                echo "Checksum mismatch! Expected: $EXPECTED_SUM, Got: $ACTUAL_SUM"
              fi
            fi
            sleep $((attempt * 5))
          done
          exit 1
      - name: Verify Tank auth
        env:
          TANK_TOKEN: ${{ secrets.TANK_TOKEN }}
        run: tank whoami
      - name: Publish to Tank Registry
        env:
          TANK_TOKEN: ${{ secrets.TANK_TOKEN }}
        run: |
          set +e
          output=$(tank publish 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ $exit_code -ne 0 ]; then
            if echo "$output" | grep -q "Version already exists"; then
              echo "Version already exists. Skipping."
              exit 0
            else
              echo "Publish failed with exit code $exit_code"
              exit $exit_code
            fi
          fi
