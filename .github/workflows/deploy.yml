name: Deploy Tank Skills

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  discover:
    name: Discover skills
    runs-on: ubuntu-latest
    outputs:
      skill-dirs: ${{ steps.skills.outputs.skill-dirs }}
    steps:
      - uses: actions/checkout@v5
      - id: skills
        run: |
          dirs=$(find . -mindepth 2 -maxdepth 2 -name tank.json -printf '%h\n' | sed 's#^./##' | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "skill-dirs=$dirs" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.skill-dir }}
    needs: discover
    if: needs.discover.outputs.skill-dirs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill-dir: ${{ fromJson(needs.discover.outputs.skill-dirs) }}
    defaults:
      run:
        working-directory: ${{ matrix.skill-dir }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Tank CLI
        run: sudo curl -fsSL https://raw.githubusercontent.com/tankpkg/tank/main/install.sh | sudo sh
      - name: Publish to Tank Registry
        env:
          TANK_TOKEN: ${{ secrets.TANK_TOKEN }}
        run: tank publish
